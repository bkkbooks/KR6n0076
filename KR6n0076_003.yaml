body:
  text: 對治品者研習三十七品之道隨其所對顯是義故名對治品此中先明其義然後消文菩提分義略有六門一者列名二者釋義三出體性四顯明位地五說次第六辨諸門初列名者何等名為三十七種菩提分法謂四念住四正斷四神足五根五力七覺支八支聖道四念住者一身念住二受念住三心念住四法念住四正斷者一於已生惡不善法為令斷故生欲䇿勵發勤精進䇿心持心正斷二於未生惡不善法為不生故生欲策勵乃至持心正斷三於未生善法為令生故生欲䇿勵乃至持心正斷四於已生善法為欲令住令不忘失令脩圓滿令倍脩令增長令廣大生欲䇿勵乃至持心正斷四神足者一欲三摩地斷行成成就神足二勤三摩地斷行成就神足三心三摩地斷行成就神足四觀三摩地斷行成就神足五根者一信根二精進根三念根四定根五慧根五力者信力乃至慧力七覺支者一念覺支二擇法覺支三精進覺支四喜覺支五安覺支六定覺支七捨覺支八支聖道者一正見二正思惟三正語四正業五正命六正精進七正念八正定第二釋義所謂於身與念相應住脩身觀是身念住乃至於法皆如是說云何為念謂依身增上受持正法思惟法義脩習作證於文義於脩作證中心無忘失故云何為觀謂依身增上聞思脩慧由此慧故於一切身一切相中正觀察正推求隨觀隨覺故云何脩觀或者隨身或言脩身言隨身者隨本質身觀影像身名隨身觀如對法說云何於身隨身觀謂分別別影像身身平等隨觀於身境隨觀身相似性故名於身隨身觀由隨觀察影像身門審諦觀察本質身故言脩觀者是脩環義謂非直觀相身而已於中復觀真如身故如菩薩地決擇中說云何菩薩於身住脩身觀謂於相身脩環觀真如身故云何念住為守護念為於境無染為安住所緣故為守護念者說言先守護念若常委念為於境無染者謂如說言念守護心行來等住不住取其相不取隨好廣說乃至守護意根脩律儀為安住所緣者謂如說言於四所緣安住其念由此三相善住其念故名念住亦名念處處猶住義如智度說念隨順智緣中正住是名念處總而言之若於此念住若由此念住皆名念住於此念住者謂所緣念住由此念住者謂若慧若念攝持於定是自性念住所餘相應諸心心法是相應念住此如聞所成地中說是名略說念住義也次明四正斷義者云何已生惡不善法謂能起惡行欲界煩惱及隨煩惱麤纏所攝名為已生為令斷故者謂脩對治令微薄故生欲者謂起證斷樂欲故䇿勵者謂不忍受惡及歸趣斷故發懃精進者謂多種堅固脩彼對治故此上三句顯不定地中聞思兩慧下品對治䇿心者謂脩彼對治脩慧現行若心沈沒煩惱染汙䇿心令舉故持心者謂即此對治現行之時若心浮舉煩惱染汙持心令下故云何未生惡不善法謂增盛隨眠所攝能起麤纏之因名為未生為不生故者為令麤纏不現行故生欲者謂起為證不現行欲䇿勵者謂由不忘住為令不現行善住念故此下四句如前所說云何未生善法謂聞思脩所生三慧由無過故名為善法所未得者名為未生令生故生欲者謂起證得欲䇿勵者謂求彼攝受正方便故發正起懃者謂長時殷重多堅脩習此上三句顯得不定地聞思兩慧所攝善法䇿心持心者為得脩慧故餘如前說云何已生善法謂已得故為念住者謂聞慧令不忘者謂思慧令脩滿者謂脩慧此上三句顯唯守護已所得善令倍脩令增長令廣大者如其次第不唯於彼生知足故生欲等句皆如前說此義廣如顯揚論說言正斷者亦名正懃懃是體名斷是業稱智度論云破諸耶法正道中行故名正懃行言斷者知瑜伽說初名律儀斷第二名斷斷由於已生惡不善法應脩律儀令其斷滅不應忍受故名律儀斷於未生惡令不現行為令彼不現前斷為故斷名為斷斷三者名脩斷四名防護斷由於善法數脩數習先所未得能定現前能有所斷故名脩斷由於已得諸善法中遠離放逸脩習圓滿防護已生能有所斷故名防護斷總而言之為欲顯示於黑白品捨取事中增上意樂圓滿及加行圓滿是故宣說四種正斷當知此中由生欲故意樂圓滿由自䇿勵乃至持心故加行圓滿上來所說出瑜伽論是名略說正斷也四神足義者云何名為欲懃心觀知足四種有其二義或於一人具此四法或於別人隨一增上如瑜伽論九十八卷云復次由四種力持心令定是故建立四種神足云何為四一淨意樂力二勤務力三心喜樂力四正智力當知此中由第一力於三摩地發生樂欲為證得故脩習勤務由第二力最初住心令其安定由第三力已住定心無復散動不令於我更復飄轉由第四力觀察等持所治煩惱於斷未斷如實了知又於等持入住出相能善了別如是復於奢摩他等所有諸相若於止觀諸隨煩惱及彼對治等皆如實知樂等持者於等持中但有爾所等持作事除此更無若過若增此文顯示於一行者具四種力成就等持是故建立四種神足云何別人隨一增上如顯揚論說欲增上故得三摩地者如有行者先世脩習上品善根於大師所或於有智同梵行處生信生欲聽聞正法如所信樂聞正法已展轉證得心一境性由此欲故三摩地成就言成就者謂於此中而得自在第二勤增上故得三摩地者如有行者依於教授及教誡法或在空閑或在林樹或止靜室於如是處長時勇猛純熟熾然正勤證得心住一境性由正勤故三摩地成就第三心增上故得三摩地者如有行者先已脩習奢摩他行由此因緣思惟內法速疾證得心住一境性由脩心故三摩地成就第四觀增上故得三摩地者如有行者多聞聞持其聞積集獨處樂靜即於彼法以慧簡擇極細簡擇遍覺觀察由此證得心住一境性由觀察故三摩地成就此文顯示依四行者隨一增上成就等持是故建立四種神足四中皆言斷行成就者八種斷行後當廣說言神足者從喻立名如瑜伽說如有足者能往能還騰躍勇健能得世間殊勝之法世殊勝法說名為神彼能到此故名神足如是若有欲等諸法有三摩地圓滿成辦有所堪能獲得不動能往能還騰躍勇健能得能證出世勝法由出世法最勝自在是最勝神彼能證此故名神足此亦名如意足足是滿足足於如意名如意足又是脚足有所至故如智度說問四正懃時心小亂故以定攝心故如意足譬如美食少鹽則無味得鹽則味足如意又如人有二足復得好馬好車如意所至行者如是得四念處實智慧四正懃中正精進由精進故智慧增多定力少弱得四種定以定心故智定力等所願皆得故名如意足是名略說神足義五根義者增上義是根義謂於能生出世間法是信等行為增上故又復前前望後後法於能生起為增上故乃至慧根唯望出世是名略說五根義也五力義者難伏義是力義謂若天魔若諸沙門若婆羅門若餘世間無有如法引奪者諸煩惱經亦不能屈故名難伏由此諸力具大威勢摧伏一切魔軍勢力能證一切諸漏永盡是故名力是名略說五力義也此根力義依瑜伽說七覺支義者諸已證入正性離生補特伽羅如實覺慧用此為支故名覺支亦名覺分分之言因能得覺果故名覺分如智度說無學實慧此七事能到故名為分是名略說覺支義也八支聖道義者諸聖有學已見迹者由八支攝行迹正道能無餘斷一切煩惱能於解脫究竟作證是故名為八支聖道亦名正道智度論云欲入涅槃無為城故行是諸法是時名正道是名略說正道義也問如是七法莫非是正何故勤道偏得正名答如智度說四種精進心勇發動畏錯誤故名為正勤又行道時畏墮耶道故言正道於中差別亦當後說是名略說八道支義也第三明體性者用合建立有三十七論其體性不出十法謂戒思受念定慧勤信安捨此中戒者謂表無表色法所攝餘九皆是心法所攝於中思受遍行中二念定慧者別境中三勤信安捨在善大地依此十法立三十七開戒為三正語業命思數立一謂正思惟受亦立一謂喜覺支開念立四謂念根念力念覺正念開定立八謂四如意足定根定力定覺正定慧亦立八謂四念住慧根慧力擇法覺支及與正見勤亦立八謂四正斷精進根力精進覺支及正精進信中立二信根信力安捨各一謂安覺支及捨覺支總而言之有其五類一者開八有三謂定慧勤二者開四有一謂念三者開三有一謂戒四者開二有一謂信五者唯一有四思受安捨第一類內有二十四後四類中總有十三都合則有三十七也所以開合有不第者良由定慧與勤進脩力長故開為八思受安捨助道勢短故各立一合信等法力在其中故隨階降立四三二是故體性唯有十法如智度論云三十七品十法為本乃至廣說故第四明階位者論其行實皆通諸位如瑜伽說又由身受心法增上所生善有漏無漏道皆名念住又後文言略說一切人聖道支二處所攝一者世間二出世間其世間者三漏四取所隨縛故不能盡苦是善性故能往善趣出世間者與彼相違能盡眾苦初後二法既如是說中間五法當知亦爾約行雖通依位別立是義云何大分其地判為二位謂前五法在凡夫位後之二法立聖位中凡位五法立有二義依毗曇說四念處觀在𤏙法前其四正勤在於𤏙法四如意足在於頂法五根在於忍法五力在世第一法若依此論前之三四在解脫分次之二五在通達分隨宜施設皆有道理聖位二法立有三義一者如俱舍論述餘義云有餘師說不破次第於見道中脩習覺分於見道脩道中脩聖道分故第二義者如智度說脩道用故名覺見道用故名道毗婆沙師亦同此說如彼論云道分見道覺分脩道何故如是道是知義於見道中知極速疾覺是覺義於脩道中有九種覺數數覺故隨數次第先七後八第三義者如此論說覺分在見道道支在脩道智度論中亦有是說如是三義皆有道理隨義建立無不宜故瑜伽論中通說三義第六十二卷云解了自性者謂八支聖道對治三種雜染故建立三蘊謂對治惡行雜染故對治諸欲雜染故對治諸見雜染故此文當於初師所說治諸見者在於見道治諸欲者在脩道故第十八卷言云何正直謂彼生起逆流正直聖八支道能斷見斷所有煩惱於逆流道得預隨順此文當於第二義也第二十九卷云彼於爾時最初獲得七覺支故名初有覺見聖諦迹已永斷滅見道所斷一切煩惱脩除脩道所斷煩惱此文當於第三義也第五明次第者如智度說問曰應先說道何以故行道然後得諸善法譬如人先行道然後得至處今何以顛倒先說念處後說正道答曰不顛倒也三十七品是初欲入道時名因字如行者至師所聽道時先用念持是法是時名念處持已從法中求果故精進行是時名正勤多精進故心散麤攝心調柔故名如意足心調柔已生五根諸法實相甚深難解信根故能信是名信根不惜身命一心求道理是精進根常念是道不念餘東事是名念根攝心在道是名定根觀諦實相是名慧根五根增長能遮煩惱是名為力得是力已分別道法有二分三法三起三法三下念在二處如守門人是名七覺分得是法已欲入涅槃無為城故行是八法是名為道故又瑜伽說當知此中於念住位最初繫心置所緣境次於所緣念安住勤脩正斷次得定已後令此定善圓滿故於神足中勤脩加行定圓滿已為令一切相及麤重得離繫故依信等根脩加行加行中根是下品力是上品如是正脩加行道已次得覺支通達實際通達實際已次脩道支漸漸乃至證得阿耨菩提於一切鄣皆得解脫如是二論所說次第皆約隨數階位門說第六辨諸門者如是七法皆有五門如對法說復以一切菩提分法無有差別皆由五門而得建立謂所緣故自體故助伴故脩習故脩果故念處所緣者謂身受心法即是四事謂我所依事我受用事我自體事我染淨事何故唯立此四境者由顛倒覺愚癡凡夫多分計我依止有根身受用苦樂故取了境為相由貪等染汙由信等清淨是故最初為正觀察真實事相故立此四為所緣境總說雖然於中分別者如是四事各有三種一內二外三者內外瑜伽論中略說六義一者內自有情數色為內身境外非有情數色為外身境他有情數色為內外身境緣此內身起愛念法名為內受內心內法法外與內外亦如是說二者根所攝有執受色為內身非根所攝無執受色為外身非根所攝有執受色為內外身緣此三種起受心法隨其所應即為三種三者自內定地輕安俱色為內身自內不定地麤重俱色為外身若他輕安俱色麤重俱色為內外身緣此三種起受心法即以為三如前應知乃至第六自身中髮毛爪齒等相為內身他身髮毛等相為外身若內身變異不變異青瘀等相及外身變異不變異青瘀等相相似法性平等法性是為內外身緣此三境起受心法隨其所應即三智度論中亦六義釋內身與前所說大同小異總觀彼二為內外身無別內外前二不攝如彼說言復作是念內觀不得外或有耶外觀亦復不得自念我或錯誤是故今當總觀內外觀內觀外是為別相一時俱觀是為總相總觀別觀了不可得所觀已竟受心法中內外等三有同喻伽亦有異說異說云何謂意識相應受是內受等五識相應受是外受等定心是內心散心是外心等除受餘心數法是為內法不相應行及無為法是為外法等乃至廣說是為念處所緣境也第二念住自體者此有二義若對所治以慧為體由慧正治四顛倒故若對所緣慧念為體慧與念俱住所緣故智度論云觀身智慧乃至觀法智慧是為自性念處此對所治顯自性也對治論云念住自體者謂慧及念由佛經中有於身等隨觀言故及有念住言故如其次第此對所緣出自性也第三念住助伴者與彼相應諸心法及彼為首所發果等如對法說念住助伴者與彼相應心心法等彼者謂彼念慧二法智度論云云何名共念處觀身為首因緣生道若有漏若無漏是身念處乃至觀法皆如是說又下文言共念處中身口二業是為色法餘殘非色故第四念處脩習者略有二門謂共脩習不共脩習共脩習者謂共小乘脩於內身等脩隨身觀於外身等及內外身脩隨身觀謂觀不淨乃至無我知是等名共小乘脩不共脩者唯菩薩觀謂於身等除內外想唯觀身等中道實相如瑜伽說是諸菩薩普於一切二乘理趣菩提分法皆如實知謂於聲聞乘理趣及於大乘理趣云何菩薩大乘理趣菩提分法如實了知謂諸菩薩能於其身住脩身觀不於其身分別有性亦不分別一切種類都無所有又於其身遠離言說自性法性如實了知乃至廣說又言復次依空勤脩念住菩薩略於六種忘相縛中令心解脫何等為六所謂於身乃至於法發起內相是初相縛即於此中發起外相是第二縛即於此中起內外相是第三縛若於十方無量有情願令解脫脩習念住此中諸相是第四縛若由此故於身等境脩觀而住此中諸相是第五縛即於身等脩觀住者此中諸相是第六縛乃至廣說智度論云菩薩摩訶薩四念處觀者觀是內身無常若如病如癰灾聚敗壞不淨充滿九孔流出是為行廁廣說乃至是身相不在內不在外不在中間是身先際後際中際皆不可得但從諸法因緣和合生是諸因緣作是身者亦從虗妄顛倒故有是因緣中無因緣相是因緣生亦無生相相如是思推知於是身從本以來無有生相無生故無相無相故無生但誑凡夫故名為身菩薩如是觀身實相離諸染著繫念在身住脩身觀是名菩薩身念處觀觀外身內外身亦如是受心法等乃至廣說第五明念住脩果者如對法說斷四顛倒趣入四諦身等離繫是名脩果斷斷四倒者謂四念住隨其次第能斷淨樂常我四倒也由身念住趣入苦諦所有色身皆行苦相麤重所顯故是故脩觀行時能治此輕安於身差別生故由受念住趣入集諦以樂等諸受是和合愛等所依處故由心念住趣入滅諦觀離我識當無所有懼我斷門生涅槃怖永遠離故由法念住趣入道諦為斷所治法為脩能治法故又此四種如真次第能證身受心法離繫之果由此脩習漸能遠離身等麤重故此明遠離四縛麁重言四縛者一執受縛二領受縛三了別縛四執著縛由此四縛縛於心王謂心於身由執受縛所縛謂執受內身與同安厄由是不能離身患故又心於受由領受縛所縛與受相應隨同苦樂由是不能離受患故心於諸塵由了別縛所縛攀緣六塵無時安住由是不離分別患故心於諸或由執著縛所縛與或相應隨著諸法由是不離煩惱過故如瑜伽說當知心於身由執受縛所縛於受由內領受縛所縛於色等境界相由了別縛所縛即於所說身等諸法由貪瞋等大小煩惱執著縛所縛對治如是四種縛故立四念住是明念處脩習之果念住五門略說如是次明四正斷中五門正斷所緣者謂已生未生所治能治法初正斷緣已生所治法為境第二正斷緣未生所治法為境第三正斷緣未生能治法為境第四正斷緣已生能治法為境如經所說應廣配釋正斷自體者謂於四境所起精進正斷助伴者謂彼相應心心法等正斷脩習者謂如經說生欲䇿勵發起正勤䇿心持心此中諸句顯脩正勤及所依止所依止者謂欲以欲為先發精進故正勤者謂䇿勵等於止舉捨相作意等中若於止等相作意不𮨇戀所緣境界純脩習對治爾時名䇿勵為欲損減沉沒掉舉發起正勤所以者何若沉沒隨煩惱生時為損減彼故以淨妙等作意䇿練其心若掉舉等隨煩惱生時即以內證略攝門制持其心爾時名為發起正勤即為顯此損減沉掉善巧方便故次說言䇿心持心又有別義如前釋義門中說也正勤脩果者謂盡棄於一切所治於能對治若得若證如其次第配屬應知正斷五門略說如是次明四神足中五門神足所緣者謂已成滿定所住事此復云何由已成滿三摩地力發起種種神變等事是所緣境神足自體者謂三摩地神足助伴者謂欲勤心觀及彼相應心心法等神足脩習者謂數脩習八種斷行謂欲精進信安正念正知思捨如是八種略攝為四謂加行攝受繼屬對治言加行者謂欲精進信欲為精進依信為欲因所以者何由欲求故為得此義發勤精進如是欲求不離信受有體等故攝受者謂輕安由此輕安攝益身心故繼屬者謂正念正知由不忘所緣安心一境故若有放逸生如實了知故對治者謂思捨䇿心持心二加行力已生沉掉能遠離故又能引發離隱煩惱止等相故復次欲勤心觀脩有二種謂兼因緣聚散遠離脩不劣不散彼二所依隨順脩此中顯示欲等遠聚散及因緣等二種脩義聚因緣者謂遠離毗鉢舍那故由懈怠所生沉沒散因緣者謂遠離不淨相故由掉動門所生高舉聚者謂由惛沉睡眠門於內踧踖散者謂由隨順淨妙相門於外馳散不劣隨順脩者謂依觀察相觀察諸法不散隨順脩者謂依不淨相觀察髮毛等事彼二所依隨順脩者謂脩光明相依如是次第薄伽梵說我之欲樂無有下劣亦無高舉於內不聚於外不散有後前想及上下想開發其心遠離纏縛與光明俱自脩其心當令我心無諸闇蔽上來說出對法論此中依觀察相觀察諸法者是顯彼經有前後想開發其心也依不淨相觀察髮等者是顯彼經及上下想遠離纏縛也何等名為後前上下如瑜伽論第二十八卷云脩奢摩他時脩習心品上下想脩毗鉢舍那時脩習觀品前後想上下想者謂觀察此身如其所住如其所願上從頂上下至足下種種雜類不淨充滿謂此身中所有種種髮毛爪齒如前廣說前後想者謂如有一於所觀相殷重懇到善取善思善了善達謂住觀於坐坐觀於臥或在後行觀察前行謂若說言住觀於坐此則顯示以現在作意觀察未來所知諸行所以者何現在作意位已現生故說名為住未來成所知位未現生故臨欲起故說名為坐若復說言坐觀於臥此則顯示以現在作意觀察過去所知諸行所以者何現在作意位臨欲滅故說名為坐過去所知位已謝滅故說名為臥若復說言或在後行觀察前行此則顯示以現在作意觀察無間滅現行作意所以者何若已生故無間謝滅所取作意說名前行若此無間新生能取作意取前無間已謝滅者說名後行當知此中為脩止觀脩二品勝光明想是名想脩故餘句相屬准之可知是名神足脩習之相神足脩果者謂已善脩治三摩地故隨所欲證所通達法即能隨心通達變現又於別別處所法中證得堪能自在作用如所願樂能辨種種神通等事又能引發勝品功德神足五門略說如是次明五根五門差別五根所緣者若約共行緣四聖諦若約不共行緣非安立諦五根自體者謂信勤念定慧五根助伴者謂彼相應心心法等五根脩習者謂信根於諸諦起忍可行脩精進根為覺悟故起精進行脩念根起不忘失行脩定根起心一境性行脩慧根起簡擇行脩智度論云信根者信一切法從因緣生顛倒妄見不在過去不在未來不在現在信諸法空無相無作不生不滅而信持戒禪定智慧解脫解脫知見等法乃至慧根者於諸法實相和入無礙無難於世間無憂於涅槃無喜得自在智慧故名慧根是名五根脩習略相五根脩果者謂能速發諦現觀由此增上力不久能生見道故又能脩治𤏙頂引發忍世第一法即現此身已入順決擇分位故五根五門略說如是次明五力五門差別前之四門與根相似唯脩習果少有差別謂能損減不信等鄣不可屈伏勝過於前五力五門略說如是次明七覺支五門相覺支所緣者若就二乘安立諦門所顯人空若就菩薩安立非安立諦門中人法二空以為境界覺支自體者謂念擇法精進喜安定捨如是七法是覺支體又此七法三品所攝如瑜伽說三覺支奢摩他品攝三覺支毗鉢舍那品攝一覺支通二品攝是故說名七種覺支謂擇法精進喜此三觀品所攝安定捨此三止品所攝念覺支一種俱品所攝說名所行智度論云念覺支在二處能集善法能惡法如守門人有利者令入無益者除却若心沒時念三法起若止散時念三法攝故覺支助伴者謂彼相應心心法等覺支脩習者有共不共共脩相者如對法說依遠離無欲寂滅迴向棄捨脩念覺支乃至捨覺支如是四句隨其次第顯示緣諦脩習覺支所以者何若緣苦諦為苦惱時於苦境界求遠離故名依止遠離若緣愛相為苦集時於此境界必求離欲故名依止離欲若緣苦滅為苦滅時於此境界必求作證故名依止寂靜棄捨者謂起苦滅行由此勢力棄捨苦故於此境界必求脩習故名迴向棄捨是名共脩不共脩者如智度說於一切法不憶不念是名念覺分一切法中求索善法不善法無記法皆不可得是名擇法覺分不入三界破壞諸界相是名精進覺分於一切作法不生著樂憂喜相增故是名喜覺分於一切法中除心緣不可得故名除覺分者一切法常定相不亂不定是名定覺分於一切法不著不依止亦不見是捨心是名捨覺分又觀實相智慧中生喜是名真喜得是真喜先除身喜次除心喜然後除一切法相得快樂遍身心中是為除覺分既得喜除捨諸觀行所謂無常苦空等觀有無非有非無等觀何以故無戲論是實相若不行捨便有諸諍若以有為實以無為虗若以無為實則以有為虗若以非有非無為實則以有無為虗於實愛著於虗憎恚生憂喜處云何不捨得如是喜除捨七覺分具足滿此中除者即是輕安能除麤重故名為除是為略說覺分脩相覺支脩果者謂見道所斷煩惱永其不共覺分果者生在佛家離五怖畏得百法明門動百佛世界等廣說如經也覺支五門略說如是次明八聖道支五門八聖道所緣者謂即此後時四聖諦如實性及與一切盡所有性如所有性皆是脩道位所緣故八聖道自體者正見正思惟正語正業正命正精進正念正定知是八法是道支體又此八法三蘊所攝如瑜伽說此中正見正思惟正精進慧蘊所攝正語正業正命戒蘊所攝正念正定定蘊所攝故何故覺支三品所攝說此道支三蘊攝者為顯見道止觀雙運異方便道不得雙故為顯脩道脩此三蘊能得無學位解脫蘊及與解脫知見薀故道支助伴者謂彼相應心心法等道支脩習者若其共行如覺支說不共行者如智度說菩薩於諸法空無所得住如是正見中觀正思惟相知一切思惟皆是邪乃至思惟涅槃思惟諸佛皆亦知是以何故斷一切思惟分別是名正思惟住如是正思惟中不見是正是耶過諸思惟分別是為正思惟一切思惟分別皆悉平等平等故心不著如是等名為正思惟乃至廣說道支脩果者謂分別海示他令信煩惱鄣淨隨煩惱鄣淨最勝功德鄣淨能得無量殊勝功德故是為略說道支五門菩提分義略說如是次消其文文中在先釋論發起於中二句初句總發下句別起此論中初說者謂此品初說四念處也偈中合有十二頌半於中有二前十一頌別明對治後一頌半總說對治前十一中文有六一初一頌明四念處二次一頌明四正勤三三頌半明如意足四有二頌總明根力五一頌半明七覺分六有二頌明八聖道初一頌明四念處中上半別顯下半總明然立四念處略有三意一為治四倒故二為脫四縛故三為入四諦故三種差別如前已說今於此中說第三義言麤行者是身念處所有色身麤重所隨遠離輕安是行苦相是故觀身從入苦諦言貪因者顯受念處種受起六貪愛貪愛招集三有苦聚所以觀此能入諦言種或者顯心念處心持種子作諸法本我是怖畏斷滅如實觀心趣入滅諦故不迷故者顯法念處諸法品類染淨差別無明不了覆鄣明慧不迷法相順入道諦故下半中言為入四諦故者總顯所為脩四念處觀者總明能脩釋中有二先釋上半後釋下半初中即釋麤行中先略釋文後重分別初言由身故麤行得顯者如對法說所有色身皆行苦相麤重所顯故是故脩觀行時能治此輕安於身差別生故今言麤行得顯者麤重行苦得顯現也此身以下重顯前義言麤大者是行苦相者大之言重謂麤重是行苦相也餘文可見是故以下總釋下半次脩正勤一者發起下文此下第二明四正勤頌中有二上半勝前以發於後下半係前乘顯正勤如前所說法念處中已知染法是非助道又知淨法是彼對治故言已知乃至對治如上染法已生者滅未生不起為上淨法未生令生生者增長故言為上二種故脩習四正勤也釋中有二先釋上半為滅離下次釋下半文相可知此三明如意足有三頌半即為三段初句出體次句釋名後有三頌明脩習相初言隨事住於彼者前脩正勤滅惡生善隨是無鄣有助之事故得住心於一境性心所緣境不出二種謂散麤境及靜慮境捨此散麤境住彼靜慮境以之故言住於彼也是明心住於一境性止為四如意足體性隨四增上而得定故次言為成就所說者是第二釋如意足義成就是如意義所須是其足義如意所欲無不成就即是六通自在之義如是六通名須四足如有所至必須兩足故以所須釋其足義舉果曰因名如意足也此下三頌明脩習相於中有二初之二句舉數總標下二頌半隨次別解總標中亦有二初句標所脩行捨失下句標所釋中有二初釋上半後釋下半初中亦二別釋總明別釋之中先釋初句於中亦二正釋重顯正釋中言為離正勤已者舉所隨事以釋事字次言心者無彰有助者牒能隨心次釋隨字故得住者釋住於彼也此心以下重顯前義言此心住有四能者成此心住有四勝能謂欲增上及勤心觀如是四能作但隨事能成心住一一皆隨聖言師教乃得成就心一境性故言一隨教得成就如瑜伽論第九十八卷云若有苾蒭依淨意樂及猛利欲為欲證得最勝通慧從諸如來及佛弟子殷重恭敬聽聞正法從聞無間漸次證得勝三摩地是名欲增上三摩地復有苾蒭如所聞法如所得法起大功用發大精進或正為他宣說開示或以勝妙意詞讀誦從此無間漸次因緣能隨獲得勝三摩地是名勤增上三摩地復有苾蒭於諸賢善三摩地相善取思惟觀青瘀等乃至骨鏁以為邊際由此所緣次第生起勝三摩地是名心增上三摩地復有苾蒭如所聞法如所得法獨處空閑思惟籌量審諦觀察由此因緣漸次生起勝三摩地是名觀增上三摩地乃至廣說如是四人皆隨聞法成就勝定故言隨教得成就也從此以下釋第二句於中有二初言隨教得成就者說名四如意足者將欲釋義舉體顯名也一切以下正釋其名一切所求義成就者正釋頌中為成就也言因緣者是釋所須下言故者諸所求義如意成就之所法因故說此定名如意足也別釋二句竟在於前此中以下總顯其義於中二句初句重顯如意足體下句結明次第說意初言心住名三摩提者此云等持欲明心住者九種中唯取第九等持之住以為四如意足之體何等名為九種心住一者內住二者等住三者安住四者近住五者調順六者寂靜七者最極寂靜八者專住一趣九者等持數脩數習數多脩習為因緣故得無加行無功用住任運轉道故名等持等持正是三摩地也前八種住後當更說言應知者勸知如是等持義也是故以下第二結明由前八種心住位中依四正勤勤脩習已乃得第九三摩地住故正勤後說如意足也隨事以下次釋下半言隨事隨教住者者是牒上說如意足體依內勤事及外聖教隨此因緣得成心住故言隨事隨教住也內外因緣已如前說以何方便得成此住者為滅五失以脩八行為其資根得至心住故言為滅乃至應知此意明其得四定時必須如是八種資粮乃得成就彼三摩地依對法論應作是說若依瑜伽更作異釋何者脩如意足有其二重前依欲等四增上力隨其所應得三摩地唯滅現纏未斷隨眠彼人後時欲斷隨眠更進脩習八種斷行乃得成就最勝等持合說如是前後二位建立四種神足體性是故今言隨事隨教住者者是牒前位得定四人為滅以下明彼四人隨其所應後時脩習八種斷行通而言之此八種行亦在前位但彼位中唯伏現纏是故不立斷行之名於後位中能斷隨眠是故此中方立斷行如彼論云四三摩地增上力故已遠諸纏後為永害諸隨眠故及為脩集能對治彼諸善法故便更生起欲樂䇿勵彼於如是正脩習時有八斷行為欲永害諸隨眠故為三摩地得圓滿故差別而轉此中欲者即是彼欲此中䇿勵即彼精進此中信者即彼信此中安念正知思捨即彼方便如是此中若先欲等四三摩地若今所說八種斷行於為永斷所有隨眠圓滿成辦三摩地時一切總名欲三摩地斷行成就神足乃至觀三摩地斷行成就神足乃至廣說言此中欲者彼是彼欲乃至即彼方便者是明彼先脩四定時亦有如是八種行相以彼四人脩習定時無有不依此欲精進及信方便而得定者彼時合說名四瑜伽論中不名八種斷行雖彼不立斷行之名而其行相此彼不異故言此等即彼等也又雖四人皆有欲等而隨偏增說四差別非謂欲增上者都無精進等行乃至觀增上者都無欲等行也且止乘論還釋本文何者以下生起後文從此以下有二頌半依前總標次第別顯謂初一頌明五種失後一頌半頌八斷行初中有二三句別顯一句總結其五失相釋中分明釋中次第釋五種失第一中言沒嬾惡處者著散亂處不起精進也第二中言不憶不持者不憶教言不持教旨也第三中言憂喜為體者下劣是憂憂其難進沉為事用掉起是喜喜小所得浮為事用此二相待互徧為鄣是故合立為一過失如合斷常為一邊見也第四過者沉時脩觀浮時脩止而不隨時作意脩治故不作意為過失也第五過者沉浮滅時即應任捨若沉滅後猶作離意則還起浮若浮息後猶作止意亦還入沉故無二時作意為鄣也為滅以下明能治行亦先發起於中三句初句總摽立八種定次句別顯立前四意復有以下正發下文頌中有二初之二句明前四行次之一頌顯後四行用初四行總治一鄣所以然者諸鄣之中懈怠無首除遣為難故須欲勤能所相依及與信猗因果相助依此四力乃能摧伏其後四過已失上首鄣力微劣隨一能除言依處者是第一欲及能依者第二正勤先深欲樂寂靜功德依此發起勤精進故此因緣者依處之因是第三信決定信起欲樂故言及果者能依之果是第四猗正勤為因得猗果故釋中次第釋此四種第四中言若作正勤得所求禪定故者得禪定時麤重息滅於此即得身心輕安輕安曰猗適悅為相故約得定以顯猗果餘四以下明後四行亦先發起於中先即舉數列名滅餘以下對過明次頌中四句隨顯四相初言緣境界不迷者即是正念對治忘教次言高下能覺知者是正智對第三過覺知沉浮浮高沉下隨至覺知也滅彼心功用者是明作意為滅沉浮用心作意隨起對治此中作意正是思數推發止觀故名作意非遍行內作意數也寂靜時放捨者是明捨相沉浮滅時任放而捨也釋中即四第四中言起放捨心放流相續者欲明捨位有初中後如對法論說捨者依止正勤無貪瞋癡與雜染住相違心平等性心正直性心無功用住性為體不容雜染所依為業心平等性等者謂以初中後位辨捨差別所以者何由捨與心相應離沉沒等不平等性故最初證得心平等性由心平等遠離加行自然相續故次後證得心正直性由心正直於諸雜染無故最後證得心無功用住性今言起捨心者是總標句次言放者顯初位中心平等性初始放捨不平等故次言流者顯第二位心正直性從平等流四正直故言相續者是顯第三無功用住由無功用得久住故四如意下大分第四總明根力亦先發起文相可知頌中中有二前一頌半正明行相後之二句屬當階位初中有三一頌明根一句明力後之一句明五次第初中亦二在前一句顯根起因下之三句正明根相初言已下解脫種者五根位在通達分中故先已下解脫分種望出離果所脩善根與解脫果作初種子故言已下解脫種子何等善法為其體者有師說云七方便中前三方便是解脫分以𤏙等四心是通達分故知前三屬解脫分或有說者聞思二慧施戒三業為解脫分如優婆塞戒經說云解脫分體者所謂身口意業從方便得方便有二一者耳聞二者思惟復有三種一者施二者持戒三者多聞毗婆沙中亦同此說是身口意意業偏多唯是意地不通五識是方便得亦是生得是聞思慧非是脩慧以何事種如此善根或以布施持戒多聞以此迴向解脫涅槃永離生死若有如是勇猛心者是則能種若不如是雖多布施終身持戒廣習多聞亦不能種論說如是若言前三方便是解脫分者亭心念處皆通三慧何故說言非是脩慧又婆沙云解脫分善有遠有近近者所謂前身種此身成就來身解脫遠者曾種逕那由他受身不能生遠分善優婆塞經亦同此說然利根聲聞獨覺菩薩皆於㝡後一身之中脩七方便乘得解脫若亭心觀總別念處是為解脫分善根者則於一身下種得脫何得說言逕三身體故知前三方便善者屬通達分方便所攝如說中陰識支方便故屬識支此亦如是或有說者施戒多聞及二方便皆是解脫分善根體然解脫分善有其三品中下二品聞思為體有可退義其上品者脩慧為體乘入通達分無可退義前說經論且約初種唯顯中下二品善根如對法論云從下中品解脫分善有可退義唯退現行非退習氣故又此論中約四正懃四如意是以說下解脫分種子故知此分亦通修慧門若此善根亦通修慧何以取別二分異相答信增上時立解脫分慧增上時立决擇分如對法論云於諦增上法淨信勝解相是順解脫分即於此法諦察法忍相是順决擇分如其次第信增上故慧增上且止傍論還釋本文此下三句別顯五根欲增上者是信根相若信增上必有欲樂故事增上者精進根相滅惡生善為事能故境界不迷沒者是念根相念增上者不迷失故言不散者是定根相及思擇者是慧相根釋中有三先釋根義次釋初一句後釋下三句初言此中增上次第五處流者第二句中增上之言通流五處以增上義是根義故為修以下釋初一句為修四懃故者是舉正懃兼取念處心已隨教得住者是牒四如意足心信言因此心已下解脫分種子者是明三四為解脫分依此文知如是三四位在四善根之前也一欲以下別釋五根文顯可知頌中一句第二明力即就五法以說力者由勝進時能損惑故故言說力損惑故也下之一句明五次第前前為因後後是果故初說信乃至後慧故言前因後是果也釋中即二釋初句中亦有三句初牒五根次正釋文若五以下重顯根後說力之意謂若五法始成立時黑白間赴未名為力若不信等非助或法不能鄣時乃名五力故說根力隨有次第也云何以下次釋下句於中亦三初以徵問次牒偈答云何如是以下因問別顯相生次第文相可知上來明其行相已竟若人以下屬當階位亦先發起於中二句初句對前以分後位此明五根在解脫分後次句就後別問所在此問通達分在根在力頌中二句正答此問𤏙等四位是通達分於中前二立根後二說力故言二二通達分五根及五力也此中略明四善根義欲顯此義四門分別一名二體三相四位初釋名者𤏙頂二名從喻為目其後二者當法立名謂初定心審觀聖諦與真現觀髣髴相似如攢火時初生𤏙氣與火熱觸始有相似故從此喻名為𤏙法欲令行者懃修不息如攢火者無蹔息故如智度說如是觀諦信謂涅槃道心住快樂似如無漏是名𤏙法如人攢火得有𤏙氣必聖得火故言頂法者是㝡上義修習五根至最上品如人首頂身中㝡上故從此喻名為頂法如彼五力上品就法名世第一今此五根上品從喻名為頂法雖有親疎齊顯上義如對法說由彼頂法展轉增進居上位故又復頂者是處中義何者𤏙法以前罪增福微脩行不易如似上山忍法以後罪微福增修行不難如從山下此二中間罪福亭等如至山頂已上未下故從此喻名為頂法如智度說𤏙法增進罪福亭等故名頂法如人上山至頂兩邊道里俱等故或有說者明進退際如是等義如常說也順諦忍法世第一法亦如是常說尋之可知第二出體者前二善根五根為體後二善根五力為體若取㝡勝定慧為體論其助伴通餘心法如對法說𤏙法者謂各別內證於諸諦中明得三摩地鉢羅若及彼相應等法乃至世第一法者謂各別內證於諸諦中無間心三摩地鉢羅若及彼相應等法從此無間必起㝡初出世道故第三辨相者依攢火喻辨相若別如瑜伽說譬如有人欲以其火作火所作為求火故下安乾木上施攢燧精勤筞勵勇猛攢求於下木上㝡初生𤏙次𤏙增長熱氣上衝次倍增盛其烟遂發次無焰火欻然流出火出無間發生猛焰猛焰生已便能造作火所作事如下木上初所生𤏙其𤏙善根當知亦爾燒諸煩惱無漏法火生前相故如𤏙增長熱氣上衝其頂善根當知亦爾如次烟發其順諦忍當知亦爾如無烟火欻然流出世第一法當知亦爾如火無間發生猛焰世第一法所攝五力無間所生出世無漏聖法當知亦爾故第四明階位者如一道章已廣分別故今此中不重出也四善根義略說如是釋中有二初正釋文後重分別重分別中即有二句初句順明後句反顯若人已下解脫分種則次四位得决擇分若人未下解脫分種是則不如此决擇力是謂順明反顯意也次說以下明七覺分亦先發起頌中六句約五義說言依分者初念覺分覺所依故自體分者擇法覺分覺自性故出離分者精進覺分能摧覺慧令出鄣故功德分者是喜覺分由覺實相生歡喜故三種滅或分者謂猗定捨由滅或鄣助成覺故後之二句顯三差別對法論云念者是所依支由繫念故令諸善法皆不忘失擇法者是自體支是覺自相故精進者是出離支由此勢力能到所到故喜者是利益支由此勢力身調適故安定捨者是不染污支由此不染污故依此不染污故體是不染污故如其次第由安故不染污由此能除麤重過故依定故不染污依止於定得轉依故捨是不染污體永除貪憂不染污位為自性故釋中有四初明覺位次釋名義三正釋文四問發起初明位者見道位中始覺道理故立覺分也第二之中先釋覺名無分別如如智是名覺者若約二乘無四倒分別之如如智就菩薩無一切分別之如如智次釋分義同事法明是名分義者於轉凡事成聖法中同為一趣相助而成故此七以下正釋本文云何以下徵問發起頌中二句明三差別言因緣者滅或因緣此猗覺分即是輕安與麤重因正相反故言依處者滅或依處是之覺分依於理定得轉依故自性故者是捨覺分捨離或鄣之自性故故言說者由此三種滅或義成故說三種為滅或分也釋中次第釋此三義釋初中言或鄣為重行住因者顯所對因種子麤重名為或鄣故言或鄣重即此麤重為現行或而作因緣故言為行住因此中為字應在重下也言此猗與麤重因對治故者猗是輕安反對麤重是故能為滅或因也餘文可知次說以下明八正道亦先發起頌中有二前之一頌正約四義明立八意其次一頌約後二義顯六差別初中言分决者即是正見謂後得智於所得分決了知故又復分明決了先所證故及令至者正思正語思是意業語是口業由此二種正業令他至正道故令他信三種者亦是正語及與正業正命言正業者即是身業此身口業大分有二若從無嗔無痴而起立為正語及與正業若依無貪善根所起別名正命反耶命故如智度說離五耶命故名正命何等為五一者若行者為利養故詐現奇特二者為利養故自說功德三者為利養故占相吉凶而為人說四者為利養故高聲現威令人畏驚五者為利養故稱說所得供養以動人心耶因緣活命故名為耶命也對治不助法者即是正懃正念正定以此三種治三鄣故由此四義立八道分故言說道有八分也此八種中正語一種通有二能故爾處說其餘不爾故隨一也釋中有二先明位地修道位中顯立道分者於修道中有後得智世間正見分決義故正釋文中釋前三義釋初義中即有四句初言見道分決分是正見者牒偈屬當後得正見緣自見道決定分別知其分齊故言見道分決分也第二句言此見世間正見者正出體相第三句言出世正見後得者對因分別因此以下是第四句釋分決義自所得道者是牒所知見道言及果者謂見或斷所得無為於此道果隨所得分決了分別故說正見為分決也令他以下釋令至義能令他知及得者依內正思發起正語故能令他知其有道及能令他隨行得道故說此二為令至也令他信下釋第三義舉數列名發起下文頌中二句顯三差別見者由正說故表內正見故從所表名為見也或者正業知之正命由此三行令他起信故言應知令他信也對法論說正語正業正命是令他信支如其次第令他於證理者決定信者見於正命清淨性故所以者何由正語故隨自所證菩能問答論議決擇由此了知有見清淨由正業故往來進止正行具足由此了知有戒清淨由正命故如法乞求佛所聽許衣鉢資具由此了知有命清淨也釋中有二初言令他信分者三處者是釋下句依正以下釋上三義初中言有智者正釋頌中所表見也正依業下釋次戒義依正命下釋知足義此中三句初言他得信輕財知足者是略表句於非法物無知重心故言輕財於如法物不過量取故名知足第二句者重顯上義如法行見衣服等四是釋輕財如量行見衣服等四是釋知足四二命緣者衣服飲食臥具醫藥也故令以下第三結句煩惱以下明第四義舉數列名發起下文頌中二句顯三差別言大或者根本煩惱正勤所治及小惑者是隨煩惱正念所治自在鄣者是六通鄣正定所治下言對治者對上三鄣總顯三治對法說云正精進者是淨煩惱鄣支由此永斷一切結故正念者是淨隨煩惱鄣支由此不忘失正止舉相等永不容受汎掉等隨煩惱故正定者能淨最勝功德鄣支由此引發神通等無量勝功德故釋中有二初釋三鄣第一以下對鄣明治第一中言非助煩惱有三種者明此三種皆是煩惱六通等鄣婆沙論中有三師說有說無知有說不得有說於定不得自在如是三說皆有道理今此論中且說初義是無知故說名煩惱修斷煩惱名大惑者見道所斷亦是大惑今說道分所對治故但說脩斷貪瞋等耳第二第三文顯可知第一煩惱以下第二對鄣明治次第說三文相可見於此品內有二段中別明對治竟在於前此下第二總說對治於中有二前之一頌約位分別其後二句對人分別就第一中此脩習下發起下文頌中有二初之三句別顯三位下之一句舉數總結初中言隨不倒有倒者謂凡夫位若約二乘從亭心觀至世第一法若就菩薩十信以上盡十迴向隨順見道故隨不倒未離見或故言有倒隨顛倒不倒者謂有學位若約二乘苦忍以去乃至金剛若就菩薩初地以上乃至等覺或種未盡故隨顛倒得無分別故言不倒無倒無隨倒者謂阿羅漢及如來地見或已離故言無倒脩或永盡故無隨倒下句總結文相可知釋中有二先釋下句何者以下釋上三句如次第下屬當三位隨文可知菩薩以下對人分別亦先發起頌中二句明三差別言境界者謂所緣境及思惟者謂所脩行言至得者謂所得果於此三中大小不同故言有差別也釋中即三初中言自相續身等念處是其境界者實論二乘亦離外身及內外身然其但緣自世界內不能普緣他方世界為顯其狹故說自身等也第二中言菩薩無生得道理者以其不取生滅等相得理原故名得道理第三中言為滅離身諸法者為滅身等得寂靜處是明二乘唯為自身住於寂靜以為至得菩薩不為滅離故脩者簡異二乘常在生死度群生故非不為滅離者簡異凡夫於內心中離諸鄣故但為至得無住處涅槃者離凡夫執不住流轉異二乘著不住寂靜是名無住處涅槃也脩習以下結前起後也脩住品者脩是前說道品之行住是依行建立之位行人所住故名目住此中正顯依脩立住是故名為脩住品也此品之中有三頌半於中有二前之三頌別明位相後二句約人總結初中亦二二頌一句依脩行立四位差別後之三句約法界明三位不同初中有三在前一句舉數總標次七句三字別顯四位最後二字是總結也初總標言脩住有四種謂下所說有十八位安立之意唯有四種故言有四何等為四一者前之七種立共通位共通三乘故次有二種立不共位不共二處故其次六種立前後位前後立六故最後三種立同時位同時說三故為顯道品脩行有共不共故立前二為顯因行果德有漸有頓故立後二是謂安立四種位意文中即四初之二句立共通位次有一句立不共位其次三句立前後位後一句餘立同時位初共位中即立七位因者第一因位脩住謂三乘種性前取無始後除發心於其中間唯有因性未得行果故名因位入者第二入位脩住謂三乘人隨其種性已能趣入初發心故行者第三行位脩住謂三乘人發心以後及乃至世第一法以還隨其方便脩如行故至得者第四果位脩住謂三乘人入見道位方始至得出世果故有住第五謂三乘人在脩道位未至所望作功用故無作第六謂三乘人至無學位已果所得息作用故意者第七勝德位脩住得六道隨意轉故此位通前學無學也第二段中略立二位言有上者地前菩薩依不共行已趣二乘一切位地對彼二乘無增上德顯此菩薩有增上行故名有上然此上行未是究竟其勝行有上可脩故名有上依此二義立有上位何故但立地前位者為顯菩薩在凡位時已超二乘聖果位故言無上者是如來地對諸菩薩雖過二乘而未究竟有上可脩故立如來為無上位究竟圓滿更無上故又此佛果最極上位能於我慢習氣永盡故於上相都無所在以之故名為無上位如經頌曰上相無所有故號為無上依此二義名無上位立有上者為異二乘立無上者為簡菩薩由此二義立不共位也第三段中安立六位願樂位者謂在地前四十心位願證一道業脩萬行故言入位者初地菩薩已入見道生佛家故言出位者謂次六地漸增脩道出諸鄣故受記位者謂第八地決定無退受佛記故說者位者是第九地得無礙辨善說法故灌頂位者是第十地菩薩行滿受佛位故記十方佛所放光明入菩薩頂以授佛位事同於王受位之時取四海水灌其頂故此六位者顯位階降有前後也第四段中安立三位言至位者果地法身從自往來到至得故功德位者是受用身依萬行功受萬德故住事位事者是變化身遍十方界化八相故此三住者顯果差別無前後也言已說者第三總結也釋中有三一者舉數總標二者牒數別解於中次第釋十八位第七中言勝德位者是釋頌中意字由有勝德得如意故第八中言過聲聞等位者是約有增上行之義釋有上名未入初地菩薩有約有其上可進之義釋有上名也釋無上中唯約一義釋無上也此餘釋文准前可解一切以下第三總結即釋頌中已說文也此下第二明法界位初句總標下即別顯真如法界自性無染但依客塵以顯三位故言法界復有三也言不淨者在凡夫位於諸或種無所斷故不淨淨者有覺聖位脩或未盡見或盡故言清淨者在無覺位見脩二或究竟滅故如次第者是總結也釋中即二先釋初句不淨以下釋次二句前四位中約初共位釋三差別為顯法界普通三乘是故不就餘門說也於此品內有二段中別明位相竟在於前此下半頌約人總結此中安立人者隨此位別安立別人應知如道理者勸知順理安立人也釋中有二先即總釋此中以下別顯立相言自性中住者依第一位以顯初人此人已入住者是顯第二位中立人如是等者例顯後位諸餘人也脩位已說何者得果者結前生後也得果品者依前脩住顯得果相是故名為得果品也於此品內有二頌半分作二段二頌一句別顯果相最後一句說已總結初中亦二前之一頌對因以明五果不同後一頌一句約位以顯十果差別此中在前略明其義五果之義三句分別初列名字次明體相其第三者對因分別列名字者依瑜伽說一異熟果二等流果三離繫果四士用果五增上果此就通門染淨雜說今此論說一名報果是異熟果二增上果不異彼名三隨流果是等流果四功用果是士用果五相離果是離繫果此約別門唯說善果故隨善起次第而說何者宿世善業所感報果作善法器故在初說依此報果增上力故得發善根是增上果始起以後由先世習愛樂勝善是等流果由此現在愛樂功力善根圓滿是功用果圓滿脩故能離諸鄣是故第五立相離果第二出體相者如菩薩地力種性品說云諸不善法於諸惡趣受異熟果善有漏法於諸善趣受異熟果是名異熟果習不善故樂住不善法不善法增脩習善故樂住善法善法增長或似先業後果隨轉是名等流果八支聖道滅諸煩惱名離繫果若諸異生以世間道滅諸煩惱不究竟故非離繫果諸有一類於現法中依正隨一工巧業處起士夫用所謂農作商賈事工出書算數占卜等事由此成辦諸稼穡等財利等果是名士用果若眼識等是眼根等增上果眾生等果是名士用果若眼識等是眼根身分不壞不散是命根增上果二十二根各各能起自增上果當知一切名增上果此中言或似先業後果隨轉者如因煞生受於惡趣異熟果已後生人趣受短命果由盜物故墮惡趣已後生人中受貧窮果諸如是等等流果攝餘文分明尋之可知五果體相略明如是第三封因分別者謂對十因顯其差別異熟果是引發因增上果中望心心法是同事因得善不善是引發因得等流果是生起因得士用果是引發因得離繫果是引發因此餘諸因所得之果多分入於增上果攝如瑜伽論思所成決擇中說又先所住諸業煩惱於三界中異熟果熟此異熟果因業煩惱引發因故名有因法又六識身以從眼色乃至意法為增上緣同事因故名有因法又不善法由近惡友聞非正法不正思惟引發因故名有因法與此相違三種引發因起一切善法當知亦爾即此諸因皆由各別增上果故名有果法若善不善無記諸法所有種子未被損害彼一切法皆是能生生起因故名有因法此生起因皆由各別等流果故名有果法又染污住生耶精進無果劬勞生憂苦住不染污住生正精進有果劬勞生喜樂住彼由引發因故名有因法即彼因法皆由各別士用果故名有果法又世間道趣於離欲及出世法聖道所攝能證涅槃彼由引發因故名有因法即出世道由離繫增上果故名有果法謂由究竟離繫果故若世間道非由究竟離繫果故此所引文隨義類取未必一一如彼次第五果之相略說如是次正消文初中言器果者是果報果宿習善根所得果報順脩善行為受道器故名器果此果報果通善惡道今明順果故取善道言報果者是增上果謂勝善根由器報力增上所起從因立名名為報果次言此是增上果者恐濫初果依本名別此增上果通一切法今就善法立此果故唯取器報增上所起也言愛果者是隨流果由其先世長習善根後隨彼流愛樂善法故此隨流果普通三性今明脩果唯取善法也言增長者是功用果由現在世懃功用力善根增長得圓滿故清淨果者是相離果由行圓滿出離鄣故言次第者立此器等五果前後依報果等五果次第由是相依生起次第也釋中有二初釋五果此立以下釋次第也器果中言果報者是出器體與善相應者是釋器義第二中言器果增上故者舉能起緣即是報也善根最上品者顯一所起善正出果體也第三中言宿世數習故者是舉前因愛樂善法者正出果體也第四第五文顯可知此立以下釋次第言亦可知也此下第二約位顯十於中前四是略說果其後六者是廣說果開前四果分別六故又前四果是上上果望下下因立上上果故其後六果是隨順果二二相順立三雙故初中言上上果者是第一果實是通名但從最初以立通名其後三中更立別目此第一果在入行位入為因上行為入上望下為果名上上果因位脩住唯是種性未發脩行故不立果言初果者是第二果在至得位始得出世故名初果言數習者是第三果在有作位加行功進脩名數習果究竟果者是第四果在無住位是無學果故名究竟此下三句明後六果言隨順者是前四中初上上果此果正是見道方便隨順彼故名隨順果此中三雙皆是隨順但從最初受此通名也言對治者是前四中第二初果順前方便始得見道永斷前時所伏或種是故名為對治果也言相離者前四之中後之二果學無學道相離諸鄣須發勝德故名相離言勝德者即彼位中六神通等順脩彼離鄣成此勝德是故此二亦隨順也上來諸果約共位立此下二果在不共位言有上者在菩薩地是約第三前後位說言無上者謂如來地是約第四同時位說有上無上亦相隨順故此三雙名隨順果也此下一句第二總結釋中有二一者正釋本文二者總集分別初中亦二先即總標後隨文釋此中亦二先釋十果後釋結句初中亦二先正釋文次分別義釋文中言從自性發心者從下自性得上發心也乃至脩行者從下發心乃至其上脩行此顯上上果體相也應知後後次第者此以後後釋上上義謂發心位是自性後其脩行位是發心後約此後後立上上果自性非後故不立果也釋次三果文相可知釋隨順中言為因緣故者是釋隨順義即第一果與第二果作因緣故名為隨順言應知上果者是出體也釋對治中言是滅道者出其體相斷滅之道故名滅道言因此得初果者因此隨順得見道果是對前果顯隨順義言此中初道名對治果者是舉果體以富其名也釋相離中言相離果者是牒其名言數習果圓滿果者是出其體謂前四中後二為體圓滿即是究竟義故言為遠離或鄣故者釋相離義言如次第有學無學諸聖人果者此是約人顯其果位也釋次三果文相可知如是以下重分別義言如是四果者一者第四名究竟果二者第七名相離果三者第八名勝位果四者第十名無上果此四種果皆顯圓滿果位差別故言為分別圓滿果故也准此而論其餘六果為分別因而不說者非令同故非令同者四果等顯一位之果六果隨顯別位因故為略說下釋其結句言為略說如是多者是正釋文或五或十故言多也言若廣說則無量者是顯結意謂結句言略說意者為顯廣說有無量果也上來第一正釋文竟此下第二總集分別於中有二初正集義後結究竟初中有三先集對治次集脩位後集得果初中亦二總標別集別集之中對上品說列十二脩覺悟脩者是四念處體是智慧離無明故攝論說此名顯示脩除無明闇顯了境故令薄脩者是四正懃懃脩二善薄二惡故彼論名為損滅脩也熟治脩者四如意足體是靜慮成就治道故彼論名為治成脩也上事者脩即是五根為起上位五力事能故彼論名為後行脩也密合脩者即是五力行與理合能勝煩惱故言智到境一家故者釋密合義彼論名為相應脩也上品脩者是七覺分始入出世上於世間故彼論名為勝智脩也勝品脩者是八聖道進入脩道勝於上品故彼論名為上上脩也初發脩者是凡夫位如前頌言隨不倒有倒故彼論名為初際脩也中行脩者有學聖位如前頌言隨顛倒不倒故彼論名為中際脩也最後脩者無學聖位如前頌言無倒無隨倒故彼論名為後際脩也有上脩者是二乘脩無上脩者是菩薩脩如前頌言境界及思惟至得有差別故境界無勝以下舉彼三義釋無上也言無集者菩薩思惟破折諸相行無所得故言無集對二乘思集取苦無常等相也此下第二集脩住義於中亦二總標別明略舉五位集諸脩住第一中言應成脩住者是牒其名此人住自性中者舉人屬位即是前名因住脩住雖未成就有應成性故名應成也第二中言作事脩住者是牒其名後發心乃至脩行者屬當其位即是前名入位行位也第三中言名最淨位者先牒前位謂前第四名至得位至得之名同法身位是故名為最淨位次言最淨位者是立其名欲顯此位非體最淨但名最淨故名為最淨住也第四中言有莊嚴位住者是立其名遍滿十地故者釋莊嚴義於十他中十種法界及十度等有為無為功德遍滿是故名為有莊嚴位脩住第五中言無上位住者是立其名義已顯前故不更說以此五位總攝上說十八種位及次所說法界三位隨其所應相攝應知此下第三集其果義於中亦二總標別集別集之中明六種果先列其名後辨其相一攝持果者集前五果彼報果等五果之中攝一切果無不盡故又器果等五果之內盡攝次說十種果故以是二義名攝持果二最勝果者集彼十果就彼普攝五果之內簡取最勝立此十果是故名為最勝果也其次二果重顯五果後之二果重顯十果三數習果者顯五果中初果報果數習善根所得報故四上上引出果者顯五果內後之四果於報果上出增上果乃至功用果上引出相離果故五略果者顯十果內在前四果六廣果者顯十果中後之六果略廣之義如前已說此中以下次第顯相言攝持果者是五種果者是顯初果義如前說言餘果是五種果別異者顯最勝果後說十果名為餘果五果之中最其殊勝故言是五果之別果也言宿世所集故名果報果者是顯數習果五果之初也言上上引出故有四種果者是上上引出果即是五中後四也言若略說上上果有四種者是顯略果即是十中在前四果約通義故說上上果有四種也言若廣說隨順果有六者是顯廣果即是十中後六種果亦就通義故言隨順果有六也是四種果分別廣說故者釋廣果名就前四果分別說六故後六種名廣果也中邊以下總結究竟言此處有四者總相而言對治脩住得果三品合為一處以依行立位就位立果文勢相乘無隔絕故故釋論主合此三品一處集義由是義故至於此處則有四處一相二鄣三真實其第四者謂行住果以之故言此處有四第四處內別有三義隨別立品故言三品也
